name: Release Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: windows-latest
            arch: amd64
          - os: macos-latest
            arch: arm64
          - os: macos-15-intel
            arch: amd64

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_VERSION: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Normalize version for manual runs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          tag="$(git describe --tags --abbrev=0)"
          echo "RELEASE_VERSION=$tag" >> "$GITHUB_ENV"

      # Generic JBR 25 + Node + packaging-tools + Gradle setup. Potassium ships no setup
      # action of its own, so this Nucleus-hosted action is reused purely for environment setup.
      - name: Set up build environment
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main
        with:
          packaging-tools: 'true'
          setup-gradle: 'true'
          setup-node: 'true'

      # Import the Developer ID Application cert into a temporary keychain so Potassium can
      # codesign + notarize each per-arch build at package time. Exports MAC_KEYCHAIN_PATH,
      # which desktopApp/build.gradle.kts feeds to the macOS signing config.
      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          MAC_CERTIFICATES_P12: ${{ secrets.MAC_CERTIFICATES_P12 }}
          MAC_CERTIFICATES_PASSWORD: ${{ secrets.MAC_CERTIFICATES_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          KC_PASSWORD="$(uuidgen)"
          KC_PATH="$RUNNER_TEMP/build.keychain-db"
          P12="$RUNNER_TEMP/cert.p12"
          echo "$MAC_CERTIFICATES_P12" | base64 -d > "$P12"
          security create-keychain -p "$KC_PASSWORD" "$KC_PATH"
          security default-keychain -s "$KC_PATH"
          security unlock-keychain -p "$KC_PASSWORD" "$KC_PATH"
          security set-keychain-settings -lut 21600 "$KC_PATH"
          security import "$P12" -k "$KC_PATH" -P "$MAC_CERTIFICATES_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PASSWORD" "$KC_PATH"
          security list-keychains -d user -s "$KC_PATH" $(security list-keychains -d user | tr -d '"')
          rm -f "$P12"
          security find-identity -v "$KC_PATH" || true
          echo "MAC_KEYCHAIN_PATH=$KC_PATH" >> "$GITHUB_ENV"

      - name: Build packages
        shell: bash
        env:
          # Azure Trusted Signing service-principal credentials.
          # Only consumed on Windows runners by electron-builder when AZURE_TENANT_ID
          # is set (gating happens in desktopApp/build.gradle.kts).
          AZURE_TENANT_ID: 'dfe2ba9a-411b-4907-b6b0-59fe59aefc2d'
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # App-specific password for macOS notarization (consumed only by the macOS package task;
          # MAC_KEYCHAIN_PATH is exported by the import step above when signing is configured).
          NOTARY_PWD: ${{ secrets.MAC_NOTARIZATION_PASSWORD }}
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS --stacktrace --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch }}
          retention-days: 3
          path: |
            desktopApp/build/potassium/binaries/**/*.dmg
            desktopApp/build/potassium/binaries/**/*.pkg
            desktopApp/build/potassium/binaries/**/*.exe
            desktopApp/build/potassium/binaries/**/*.msi
            desktopApp/build/potassium/binaries/**/*.appx
            desktopApp/build/potassium/binaries/**/*.deb
            desktopApp/build/potassium/binaries/**/*.rpm
            desktopApp/build/potassium/binaries/**/*.AppImage
            desktopApp/build/potassium/binaries/**/*.snap
            desktopApp/build/potassium/binaries/**/*.flatpak
            desktopApp/build/potassium/binaries/**/*.zip
            desktopApp/build/potassium/binaries/**/*.tar
            desktopApp/build/potassium/binaries/**/*.7z
            desktopApp/build/potassium/binaries/**/*.blockmap
            desktopApp/build/potassium/binaries/**/signing-metadata.json
            desktopApp/build/potassium/binaries/**/packaging-metadata.json
            !desktopApp/build/potassium/binaries/**/app/**
            !desktopApp/build/potassium/binaries/**/runtime/**
          if-no-files-found: error

  android:
    name: Build & publish Android (Play)
    # Opt-in: set repository variable PUBLISH_ANDROID=true once the signing/Play
    # secrets are configured. Until then this job is skipped so it can't fail releases.
    if: ${{ vars.PUBLISH_ANDROID == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RELEASE_VERSION: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Normalize version for manual runs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          tag="$(git describe --tags --abbrev=0)"
          echo "RELEASE_VERSION=$tag" >> "$GITHUB_ENV"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode upload keystore
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"

      - name: Build release bundle (.aab)
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :androidApp:bundleRelease -PiosSkip=true -PlintSkip=true --stacktrace --no-daemon

      - name: Publish to Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: warlockfe.warlock3
          releaseFiles: androidApp/build/outputs/bundle/release/androidApp-release.aab
          track: internal
          status: completed

  publish:
    name: Publish Release
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-assets-*

      - name: Determine version and channel
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          if [[ "$VERSION" == *"-alpha"* ]]; then
            echo "CHANNEL=alpha" >> "$GITHUB_ENV"
            echo "RELEASE_TYPE=prerelease" >> "$GITHUB_ENV"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            echo "CHANNEL=beta" >> "$GITHUB_ENV"
            echo "RELEASE_TYPE=prerelease" >> "$GITHUB_ENV"
          else
            echo "CHANNEL=latest" >> "$GITHUB_ENV"
            echo "RELEASE_TYPE=release" >> "$GITHUB_ENV"
          fi

      # Potassium's own publish scripts (vendored under .github/scripts), so the release
      # pipeline no longer depends on the Nucleus composite actions for packaging output.
      - name: Generate update YML files
        shell: bash
        run: .github/scripts/generate-update-yml.sh artifacts "$VERSION" "$CHANNEL"

      - name: Publish release
        shell: bash
        run: .github/scripts/publish-release.sh artifacts "$TAG" "$RELEASE_TYPE"
