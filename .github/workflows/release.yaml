name: Release Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: windows-latest
            arch: amd64
          - os: macos-latest
            arch: arm64
          - os: macos-15-intel
            arch: amd64

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_VERSION: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Normalize version for manual runs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          tag="$(git describe --tags --abbrev=0)"
          echo "RELEASE_VERSION=$tag" >> "$GITHUB_ENV"

      # JBR 25 (via actions/setup-java jetbrains), Linux packaging tools + Xvfb, Node, and Gradle.
      - name: Set up build environment
        uses: sproctor/potassium/.github/actions/setup-potassium@v0.3.0
        with:
          java-version: '25'
          packaging-tools: 'true'
          setup-gradle: 'true'
          setup-node: 'true'

      # Import the Developer ID Application cert into a temporary keychain so Potassium can
      # codesign + notarize at package time. Its path reaches the macOS signing config via the
      # MAC_KEYCHAIN_PATH env on the build step below.
      - name: Set up macOS signing
        id: signing
        if: runner.os == 'macOS'
        uses: sproctor/potassium/.github/actions/setup-macos-signing@v0.3.0
        with:
          certificate-base64: ${{ secrets.MAC_CERTIFICATES_P12 }}
          certificate-password: ${{ secrets.MAC_CERTIFICATES_PASSWORD }}

      - name: Build packages
        shell: bash
        env:
          # Azure Trusted Signing service-principal credentials.
          # Only consumed on Windows runners by electron-builder when AZURE_TENANT_ID
          # is set (gating happens in desktopApp/build.gradle.kts).
          AZURE_TENANT_ID: 'dfe2ba9a-411b-4907-b6b0-59fe59aefc2d'
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # macOS signing: keychain holding the Developer ID cert (empty off macOS) + the
          # app-specific notarization password. Both are only read by the macOS package task.
          MAC_KEYCHAIN_PATH: ${{ steps.signing.outputs.keychain-path }}
          NOTARY_PWD: ${{ secrets.MAC_NOTARIZATION_PASSWORD }}
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS --stacktrace --no-daemon

      - uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch }}
          retention-days: 3
          path: |
            desktopApp/build/potassium/binaries/**/*.dmg
            desktopApp/build/potassium/binaries/**/*.pkg
            desktopApp/build/potassium/binaries/**/*.exe
            desktopApp/build/potassium/binaries/**/*.msi
            desktopApp/build/potassium/binaries/**/*.appx
            desktopApp/build/potassium/binaries/**/*.deb
            desktopApp/build/potassium/binaries/**/*.rpm
            desktopApp/build/potassium/binaries/**/*.AppImage
            desktopApp/build/potassium/binaries/**/*.snap
            desktopApp/build/potassium/binaries/**/*.flatpak
            desktopApp/build/potassium/binaries/**/*.zip
            desktopApp/build/potassium/binaries/**/*.tar
            desktopApp/build/potassium/binaries/**/*.7z
            desktopApp/build/potassium/binaries/**/*.blockmap
            desktopApp/build/potassium/binaries/**/signing-metadata.json
            desktopApp/build/potassium/binaries/**/packaging-metadata.json
            # electron-builder update manifests, uploaded to the release as-is.
            desktopApp/build/potassium/binaries/**/latest*.yml
            desktopApp/build/potassium/binaries/**/beta*.yml
            desktopApp/build/potassium/binaries/**/alpha*.yml
            !desktopApp/build/potassium/binaries/**/app/**
            !desktopApp/build/potassium/binaries/**/runtime/**
          if-no-files-found: error

  android:
    name: Build & publish Android (Play)
    # Opt-in: set repository variable PUBLISH_ANDROID=true once the signing/Play
    # secrets are configured. Until then this job is skipped so it can't fail releases.
    if: ${{ vars.PUBLISH_ANDROID == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RELEASE_VERSION: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Normalize version for manual runs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          tag="$(git describe --tags --abbrev=0)"
          echo "RELEASE_VERSION=$tag" >> "$GITHUB_ENV"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6

      - name: Decode upload keystore
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"

      - name: Build release bundle (.aab)
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :androidApp:bundleRelease -PiosSkip=true -PlintSkip=true --stacktrace --no-daemon

      - name: Publish to Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: warlockfe.warlock3
          releaseFiles: androidApp/build/outputs/bundle/release/androidApp-release.aab
          track: internal
          status: completed

  publish:
    name: Publish Release
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: release-assets-*

      - name: Determine release type
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          if [[ "$TAG" == *-alpha* || "$TAG" == *-beta* ]]; then
            echo "RELEASE_TYPE=prerelease" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TYPE=release" >> "$GITHUB_ENV"
          fi

      # Uploads installers + electron-builder's latest-*.yml, unioning the shared-name
      # macOS/Windows manifests across arches (Linux manifests are already per-arch).
      - name: Publish release
        uses: sproctor/potassium/.github/actions/publish-github-release@v0.3.0
        with:
          artifacts-path: artifacts
          tag: ${{ env.TAG }}
          release-type: ${{ env.RELEASE_TYPE }}
